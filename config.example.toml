# audiov configuration example

[whisper_cpp]
# Local whisper model path
model = "models/ggml-base.bin"

# Runtime tuning
threads = 4
temperature = 0.0

# Optional acceleration flags (depends on your whisper.cpp build)
use_gpu = false


[whisper]
# Transcription backend: cpp | remote
backend = "cpp"

[whisper_remote]
# Enable remote Whisper-compatible HTTP API.
enabled = false

# Compatible with OpenAI audio transcription API format.
endpoint = "https://api.openai.com/v1/audio/transcriptions"
model = "whisper-1"

# Put your API key here.
api_key = ""

# HTTP timeout in seconds.
timeout_secs = 60

[language_detection]
# Enable language identification (LID) before transcription.
enabled = true

# One-shot detection per push-to-talk recording session.
mode = "per_session"

# Allowed language whitelist for low-latency routing.
allowed_languages = ["zh", "en"]

# If true, detected/fallback language is passed to whisper inference.
use_detected_language_for_inference = true

# If confidence is below threshold, runtime falls back to default_language.
confidence_threshold = 0.65

# Default language used when detection fails / low confidence / not whitelisted.
default_language = "zh"

[hotkey]
# Global push-to-talk hotkey (supports combos, e.g. windows+h / ctrl+space / f8).
key = "windows+h"

[paste]
# Command used to trigger paste event for focused app.
# This default sequence means Ctrl+V in ydotool scan codes.
command = ["ydotool", "key", "29:1", "47:1", "47:0", "29:0"]

[recorder]
# Native recorder backend: auto | pipewire | pulseaudio | alsa
backend = "auto"

# Optional input device/source name for the selected backend.
# - PipeWire: pw node/target name used with `pw-cat --target`
# - PulseAudio: source name used with `parec --device`
# - ALSA: hw/plughw PCM name used with `arecord -D`
# input_device = ""

[targets]
# Accuracy objective for zh/en in local benchmark conditions.
zh_en_accuracy_target = 0.95

[performance]
# Product preference: lower end-to-end latency.
priority = "latency"
